server:
  host: "0.0.0.0"
  port: 5678

output:
  path: "dash.png"
  orientation: "portrait"  # portrait | landscape (output image always 1080x1440 PNG)

cache:
  data_path: ".cache/dashboard-data.json"

schedule:
  enabled: true
  cron: "*/15 * * * *"
  timezone: "Asia/Shanghai"

market:
  symbols:
    - "JC1.LW"
    - "600519.SS"
    - "000001.SZ"
    - "AAPL"
    - "MSFT"
    - "BTC-USD"
    - "ETH-USD"
    - "^NDX(NQ=F)"  # show ^NDX while open, NQ=F (with ^NDX as a second line) when closed
    - "GC=F"
  denoise_symbols:  # only these symbols get glitch/outlier bars dropped from the curve
    - "GC=F"
  custom_symbols:
    JC1.LW:
      url: "http://100.89.106.48:8110/api/data"
      product: "jc1"
      timeout_seconds: 10
      lookback_days: 30
      timezone: "Asia/Shanghai"
      sessions:
        - "09:00-11:30"
        - "13:00-15:00"

weather:
  location: "Shanghai"
  latitude:
  longitude:

codex:
  token: ""
  usage_url: "https://chatgpt.com/backend-api/wham/usage"
  timeout_seconds: 15
